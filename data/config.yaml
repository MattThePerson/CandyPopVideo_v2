
# folder to save app data (db, preview media, custom thumbs, ...)
app_data_dir: /path/to/app/data/directory/here

# folder to save generated gifs
gifs_dir: null

# subtitle_folders:
#     - /path/to/subtitles

video_extensions: [ .mkv, .mp4, .mov, .avi, .flv, .wmv, .vid, .flv, .webm ]

# formats used to extract video/scene data from filename
scene_filename_formats: [
  '{primary_actors} - {studio:S} - [{year:d}];opt [{date_released_short:%Y-%m}];opt [{date_released:%Y-%m-%d}];opt [{date_released_alt:%Y.%m.%d}];opt [{line:S}];opt {title} [{secondary_actors}];opt {{{source_id:S}}};opt',
  '[{studio:S}] [{year:d}];opt [{date_released:%Y-%m-%d}];opt [{date_released_alt:%Y.%m.%d}];opt [{line:S}];opt {title} [{primary_actors}];opt {{{source_id:S}}};opt',
  '[{date_released:%Y-%m-%d}] {title} {{{source_id:S}}}', # 3dh
  '[{date_released:%Y-%m-%d} {time_released}] {title} [{source_id_sec}];opt [{source_id}]', # mdown
  '{primary_actors} [{dvd_code:S}] [{date_released:%Y-%m-%d}];opt [{date_released_alt:%Y.%m.%d}];opt [{studio:S}];opt {title}',
  '[{dvd_code:S}]',
  '{primary_actors} - [{year:d}];opt [{date_released:%Y-%m-%d}];opt {title} ({year:d});opt',
  '{title} ({year:d}) [{primary_actors}];opt',
  '{title}',
]

# COLLECTIONS
# Put ! before path to ignore folder contents altogether
collections:
  CollectionName:
    - /path/to/videos
